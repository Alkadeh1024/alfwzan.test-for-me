<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تحضير الشيخ — الفوزان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="headerSlot"></div>
  <main>
    <div class="container">
      <div id="loginView" class="auth-wrap">
        <div class="auth-card">
          <h2>دخول الشيخ / المعلم</h2>
          <div class="field"><label>الحساب</label><input type="text" id="user" placeholder="alfwzan@msh"/></div>
          <div class="field"><label>كلمة المرور</label><input type="password" id="pass"/></div>
          <button class="btn btn-primary btn-block" id="loginBtn">دخول</button>
          <p id="loginErr" style="color:#b3261e;display:none">خطأ في البيانات.</p>
        </div>
      </div>
      <div id="dashView" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;margin:24px 0">
          <h1 id="teacherTitle" style="font-family:'Aref Ruqaa',serif">التحضير</h1>
          <a href="#" id="logoutLink" class="btn btn-ghost btn-sm">خروج</a>
        </div>
        <div class="search-card">
          <div class="row">
            <div class="field"><label>الحلقة</label><input type="text" id="qHalaqa"/></div>
            <div class="field"><label>المرحلة</label><select id="qLevel"><option value="">الكل</option><option>ابتدائي</option><option>متوسط</option><option>ثانوي</option></select></div>
          </div>
          <button class="btn btn-primary" id="loadHalaqaBtn">عرض</button>
        </div>
        <div id="halaqatList"></div>
        <div id="weekArea"></div>
      </div>
    </div>
  </main>
  <div id="footerSlot"></div>
  <script src="js/common.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
