<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>تحضير الشيخ — الفوزان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&family=Amiri:wght@400;700&family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="headerSlot"></div>
  <main>
    <div class="container">
      <div id="loginView" class="auth-wrap">
        <div class="auth-card">
          <h2>دخول الشيخ / المعلم</h2>
          <p class="muted">حساب التحضير وتقدير الحفظ فقط</p>
          <div class="field"><label>الحساب</label><input type="text" id="user" placeholder="alfwzan@msh" data-testid="t-login-user"/></div>
          <div class="field"><label>كلمة المرور</label><input type="password" id="pass" data-testid="t-login-pass"/></div>
          <button class="btn btn-primary btn-block" id="loginBtn" data-testid="t-login-btn" data-i18n="login">دخول</button>
          <p id="loginErr" style="color:#b3261e;margin-top:10px;display:none">بيانات الدخول غير صحيحة.</p>
          <p class="muted" style="margin-top:14px">للمشرف الأساسي: <a href="admin.html">دخول من هنا</a></p>
        </div>
      </div>

      <div id="dashView" style="display:none">
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin:24px 0 12px">
          <h1 id="teacherTitle" style="margin:0;font-family:'Aref Ruqaa',serif;color:var(--primary)">التحضير وتقدير الحفظ</h1>
          <a href="#" id="logoutLink" class="btn btn-ghost btn-sm" data-testid="t-logout"><span id="logoutLabel">خروج</span></a>
        </div>

        <div class="search-card">
          <div class="row">
            <div class="field"><label data-i18n="fld_halaqa">اسم الحلقة</label><input type="text" id="qHalaqa" data-testid="t-q-halaqa" data-i18n-placeholder="halaqa_search" placeholder="ابحث بالحلقة"/></div>
            <div class="field"><label data-i18n="fld_level">المرحلة</label>
              <select id="qLevel" data-testid="t-q-level">
                <option value="" data-i18n="fld_all">الكل</option>
                <option data-i18n="lvl_primary">ابتدائي</option><option data-i18n="lvl_middle">متوسط</option><option data-i18n="lvl_high">ثانوي</option>
              </select></div>
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button class="btn btn-primary" id="loadHalaqaBtn" data-testid="t-load-halaqa" data-i18n="search">عرض الحلقات</button>
            <button class="btn btn-ghost" id="prevWeekBtn" style="display:none">‹ السابق</button>
            <button class="btn btn-ghost" id="thisWeekBtn" style="display:none">الأسبوع الحالي</button>
            <button class="btn btn-ghost" id="nextWeekBtn" style="display:none">التالي ›</button>
          </div>
        </div>

        <div id="halaqatList"></div>
        <div id="weekArea" style="margin-top:18px"></div>
      </div>
    </div>
  </main>
  <div id="footerSlot"></div>
  <script src="js/common.js"></script>
  <script src="js/teacher.js"></script>
</body>
</html>
