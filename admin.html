<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لوحة المشرف — الفوزان</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@400;700&family=Tajawal:wght@300;400;500;700;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="headerSlot"></div>
  <main>
    <div class="container">
      <div id="loginView" class="auth-wrap">
        <div class="auth-card">
          <h2>دخول المشرف</h2>
          <p class="muted">أدخل بيانات الدخول للمتابعة</p>
          <div class="field"><label>الحساب</label>
            <input type="text" id="user" placeholder="alfwzan@admin" data-testid="login-user"/></div>
          <div class="field"><label>كلمة المرور</label>
            <input type="password" id="pass" data-testid="login-pass"/></div>
          <button class="btn btn-primary btn-block" id="loginBtn" data-testid="login-btn">دخول</button>
          <p id="loginErr" style="color:#b3261e;margin-top:10px;display:none" data-testid="login-err">بيانات الدخول غير صحيحة.</p>
        </div>
      </div>
      <div id="dashView" style="display:none">
        <div class="dash-topbar">
          <div>
            <h1 style="margin:0;font-family:'Aref Ruqaa',serif;color:var(--primary)">لوحة المشرف</h1>
            <p class="muted" style="margin:4px 0 0">عدّل المحتوى، ثم اضغط <b>نشر التغييرات</b> لرفعها على GitHub.</p>
          </div>
          <div class="topbar-actions">
            <button class="btn btn-accent" id="publishBtn" data-testid="publish-btn">نشر التغييرات</button>
            <button class="btn btn-ghost btn-sm" data-open="ghSettings" data-testid="open-gh-settings">إعدادات النشر</button>
            <button class="btn btn-ghost btn-sm" id="pullBtn" data-testid="pull-btn">جلب من GitHub</button>
          </div>
        </div>
        <div class="dash">
          <aside class="dash-side" data-testid="dash-side">
            <a href="#about" class="active" data-tab="about">لمحة عنا</a>
            <a href="#ach" data-tab="ach">الإنجازات</a>
            <a href="#act" data-tab="act">الأنشطة</a>
            <a href="#halaqat" data-tab="halaqat">الحلقات</a>
            <a href="#students" data-tab="students">الطلاب</a>
            <a href="#texts" data-tab="texts">نصوص الموقع</a>
            <a href="#data" data-tab="data">البيانات</a>
            <a href="#" id="logoutLink" data-testid="logout-link" style="color:#b3261e">خروج</a>
          </aside>
          <section class="dash-main">
            <div class="tab active" id="tab-about">
              <h2>الصور والفيديوهات</h2>
              <div class="row">
                <div class="field"><label>ملفات</label><input type="file" id="aboutFiles" multiple accept="image/*,video/*"/></div>
                <div class="field"><label>وصف</label><input type="text" id="aboutCaption"/></div>
              </div>
              <button class="btn btn-primary" id="aboutAdd">إضافة</button>
              <div id="aboutList" class="gallery-grid" style="margin-top:18px"></div>
            </div>
            <div class="tab" id="tab-ach">
              <h2>الإنجازات</h2>
              <div class="row">
                <div class="field"><label>الملف</label><input type="file" id="achFile" multiple accept="image/*,video/*"/></div>
                <div class="field"><label>العنوان</label><input type="text" id="achTitle"/></div>
              </div>
              <div class="field"><label>الوصف</label><textarea id="achDesc" rows="2"></textarea></div>
              <button class="btn btn-primary" id="achAdd">إضافة</button>
              <div id="achList" class="gallery-grid" style="margin-top:18px"></div>
            </div>
            <div class="tab" id="tab-act">
              <h2>الأنشطة</h2>
              <div class="row">
                <div class="field"><label>العنوان</label><input type="text" id="actTitle"/></div>
                <div class="field"><label>البداية</label><input type="datetime-local" id="actStart"/></div>
              </div>
              <button class="btn btn-primary" id="actAdd">إضافة</button>
              <div id="actList" style="margin-top:18px"></div>
            </div>
            <div class="tab" id="tab-halaqat">
              <h2>الحلقات</h2>
              <div class="row">
                <div class="field"><label>الاسم</label><input type="text" id="halaqaName"/></div>
                <div class="field"><label>المرحلة</label><select id="halaqaLevel"><option>ابتدائي</option><option>متوسط</option><option>ثانوي</option></select></div>
              </div>
              <button class="btn btn-primary" id="halaqaAdd">إضافة</button>
              <div id="halaqaList" style="margin-top:18px"></div>
            </div>
            <div class="tab" id="tab-students">
              <h2>الطلاب</h2>
              <div class="row">
                <div class="field"><label>الاسم</label><input type="text" id="stuName"/></div>
                <div class="field"><label>الرقم</label><input type="text" id="stuSerial"/></div>
                <div class="field"><label>الحلقة</label><select id="stuHalaqa"></select></div>
              </div>
              <button class="btn btn-primary" id="stuAdd">إضافة</button>
              <div id="stuList" style="margin-top:18px"></div>
            </div>
            <div class="tab" id="tab-texts">
              <h2>نصوص الموقع</h2>
              <div id="textsForm"></div>
              <button class="btn btn-primary" id="textsSave">حفظ النصوص</button>
            </div>
            <div class="tab" id="tab-data">
              <h2>البيانات</h2>
              <button class="btn btn-primary" id="exportBtn">تصدير site.json</button>
              <input type="file" id="importFile" accept="application/json" style="display:none"/>
              <button class="btn btn-ghost" onclick="document.getElementById('importFile').click()">استيراد</button>
            </div>
          </section>
        </div>
      </div>
    </div>
  </main>
  <div class="modal" id="ghModal">
    <div class="modal-card">
      <button class="modal-close" id="ghClose">×</button>
      <h2>إعدادات GitHub</h2>
      <div class="field"><label>User</label><input type="text" id="ghUser"/></div>
      <div class="field"><label>Repo</label><input type="text" id="ghRepo"/></div>
      <div class="field"><label>Branch</label><input type="text" id="ghBranch" value="main"/></div>
      <div class="field"><label>Token (PAT)</label><input type="password" id="ghPat"/></div>
      <button class="btn btn-primary" id="ghSave">حفظ</button>
    </div>
  </div>
  <div id="footerSlot"></div>
  <script src="js/common.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
